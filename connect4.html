<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CONNECT 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      background: #0a0a1a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,255,0.03) 39px, rgba(0,255,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,255,0.03) 39px, rgba(0,255,255,0.03) 40px);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0.8rem) env(safe-area-inset-right, 0.8rem) env(safe-area-inset-bottom, 1rem) env(safe-area-inset-left, 0.8rem);
      padding-top: max(env(safe-area-inset-top), 0.8rem);
      padding-bottom: max(env(safe-area-inset-bottom), 1rem);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
    }

    h1 {
      font-size: clamp(0.75rem, 5vw, 1.4rem);
      letter-spacing: 0.12em;
      margin-bottom: 0.2rem;
      text-shadow: 0 0 10px #ff0, 3px 3px 0 #b8a000;
      animation: titlePulse 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 10px #ff0, 3px 3px 0 #b8a000; }
      50%      { text-shadow: 0 0 22px #ff0, 0 0 35px #ffa500, 3px 3px 0 #b8a000; }
    }

    .subtitle {
      font-size: clamp(0.3rem, 2vw, 0.4rem);
      letter-spacing: 0.2em;
      color: #0ff;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px #0ff;
    }

    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; }
    .screen.active { display: flex; }

    /* ── LOBBY ── */
    .lobby-box {
      background: #000;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      width: 100%;
      margin-bottom: 0.8rem;
      box-shadow: 0 0 6px rgba(255,255,255,0.04);
    }

    .lobby-box h2 {
      font-size: clamp(0.4rem, 3vw, 0.55rem);
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
      color: #888;
      
    }

    .big-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.4rem, 3vw, 0.52rem);
      padding: 0.85rem 1rem;
      width: 100%;
      background: #000;
      border: 2px solid #444;
      color: #ff0;
      cursor: pointer;
      letter-spacing: 0.05em;
      border-radius: 6px;
      
      transition: background 0.15s, color 0.15s;
      margin-bottom: 0.5rem;
      touch-action: manipulation;
    }

    .big-btn:active { background: #ff0; color: #000; text-shadow: none; }
    .big-btn.cyan { border-color: #0ff; color: #0ff; text-shadow: 0 0 6px #0ff; }
    .big-btn.cyan:active { background: #0ff; color: #000; }

    .code-input {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 6vw, 1.4rem);
      padding: 0.7rem;
      width: 100%;
      background: #000;
      border: 2px solid #555;
      color: #fff;
      border-radius: 6px;
      text-align: center;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      -webkit-appearance: none;
    }

    .code-input:focus { outline: none; border-color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.3); }

    .name-input {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.45rem, 3vw, 0.6rem);
      padding: 0.75rem;
      width: 100%;
      background: #000;
      border: 2px solid #555;
      color: #fff;
      border-radius: 6px;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
      -webkit-appearance: none;
    }

    .name-input:focus { outline: none; border-color: #ff0; }

    .room-code-display {
      font-size: clamp(1.6rem, 12vw, 2.4rem);
      letter-spacing: 0.3em;
      color: #0ff;
      text-shadow: 0 0 16px #0ff;
      margin: 0.6rem 0;
      animation: codePulse 1.5s ease-in-out infinite;
    }

    @keyframes codePulse {
      0%,100% { text-shadow: 0 0 16px #0ff; }
      50%      { text-shadow: 0 0 30px #0ff, 0 0 50px #0088ff; }
    }

    .waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4,end) infinite;
    }

    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .error-text {
      font-size: clamp(0.3rem, 2.5vw, 0.4rem);
      color: #ff4444;
      margin-top: 0.3rem;
      text-align: center;
      min-height: 1em;
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.5rem;
      background: #000;
      border: 2px solid #444;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      box-shadow: none;
      width: 100%;
      justify-content: center;
    }

    .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .score-label { font-size: clamp(0.25rem, 2vw, 0.32rem); letter-spacing: 0.06em; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score-num   { font-size: clamp(0.8rem, 5vw, 1rem); }
    .p1-color    { color: #cc0000; text-shadow: 0 0 8px #ff0000; }
    .p2-color    { color: #00cc44; text-shadow: 0 0 8px #00ff44; }
    .vs-label    { color: #555; font-size: clamp(0.3rem, 2.5vw, 0.42rem); align-self: center; }

    #status {
      font-size: clamp(0.28rem, 2.2vw, 0.44rem);
      margin-bottom: 0.5rem;
      min-height: 1.8em;
      text-align: center;
      letter-spacing: 0.05em;
      background: #000;
      border: 1px solid #333;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      transition: border-color 0.3s, box-shadow 0.3s;
      width: 100%;
    }

    #status.p1-turn      { border-color: #660000; box-shadow: none; }
    #status.p2-turn      { border-color: #005522; box-shadow: none; }
    #status.winner       { border-color: #444; color: #aaa; }
    #status.draw         { border-color: #888; color: #aaa; }
    #status.disconnected { border-color: #553300; color: #aa6600; }

    .your-role {
      font-size: clamp(0.28rem, 2vw, 0.38rem);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      text-align: center;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      background: #000;
      border: 1px solid #1e1e1e;
      width: 100%;
    }

    /* ── BOARD ── */
    #board-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #col-arrows {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      width: 100%;
      margin-bottom: 3px;
    }

    .col-btn {
      height: 28px;
      background: none;
      border: none;
      cursor: pointer;
      color: #0ff;
      font-size: 1rem;
      opacity: 0.5;
      transition: opacity 0.15s, transform 0.1s;
      text-shadow: 0 0 6px #0ff;
      touch-action: manipulation;
    }

    .col-btn:active { opacity: 1; transform: translateY(3px); }

    #board-wrap {
      background: #0022cc;
      border-radius: 10px;
      padding: 6px;
      border: 3px solid #334;
      box-shadow: none;
      width: 100%;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cell {
      /* Fill available width divided by 7 */
      aspect-ratio: 1;
      border-radius: 50%;
      background: #000824;
      cursor: pointer;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.9);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .cell::before {
      content: '';
      position: absolute;
      top: 12%; left: 18%;
      width: 28%; height: 18%;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    .cell:not(.p1):not(.p2):active { background: #050f30; }

    .cell.p1 {
      background: radial-gradient(circle at 35% 35%, #ff2200, #aa0000 55%, #660000);
      box-shadow: 0 0 10px rgba(220,0,0,0.85), inset 0 -2px 5px rgba(0,0,0,0.6);
      cursor: default;
      animation: dropIn 0.22s cubic-bezier(0.22,0.61,0.36,1);
    }

    .cell.p2 {
      background: radial-gradient(circle at 35% 35%, #00dd44, #008800 55%, #004400);
      box-shadow: 0 0 10px rgba(0,200,60,0.85), inset 0 -2px 5px rgba(0,0,0,0.6);
      cursor: default;
      animation: dropIn 0.22s cubic-bezier(0.22,0.61,0.36,1);
    }

    @keyframes dropIn {
      from { transform: scale(0.3) translateY(-30px); opacity: 0.4; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .boom {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(12px, 3.5vw, 18px);
      z-index: 2; pointer-events: none;
      animation: boomPulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes boomPulse {
      0%   { transform: scale(0.75) rotate(-12deg); opacity: 0.7; filter: drop-shadow(0 0 4px rgba(255,200,0,0.9)); }
      100% { transform: scale(1.25) rotate(12deg);  opacity: 1;   filter: drop-shadow(0 0 10px rgba(255,80,0,1)); }
    }

    .cell.win-cell { animation: winGlow 0.5s ease-in-out infinite alternate; }
    @keyframes winGlow {
      from { filter: brightness(1); }
      to   { filter: brightness(1.6); }
    }

    /* ── CHAT ── */
    #chat-wrap {
      width: 100%;
      margin-top: 0.8rem;
      background: #000;
      border: 2px solid #222;
      border-radius: 10px;
      overflow: hidden;
    }

    #chat-header {
      background: #080808;
      border-bottom: 1px solid #1a1a1a;
      padding: 0.45rem 0.8rem;
      font-size: clamp(0.28rem, 2vw, 0.35rem);
      letter-spacing: 0.12em;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #chat-header::before {
      content: '●';
      color: #0f0;
      font-size: 0.5rem;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #chat-messages {
      height: 160px;
      overflow-y: auto;
      padding: 0.6rem 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    #chat-messages::-webkit-scrollbar { width: 3px; }
    #chat-messages::-webkit-scrollbar-track { background: #000; }
    #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .chat-msg {
      font-size: clamp(0.45rem, 3.2vw, 0.58rem);
      line-height: 1.7;
      word-break: break-word;
    }

    .chat-msg .sender { font-size: clamp(0.38rem, 2.8vw, 0.5rem); margin-right: 5px; }
    .chat-msg.mine .sender   { color: #cc0000; }
    .chat-msg.theirs .sender { color: #00cc44; }
    .chat-msg.system { color: #444; font-style: italic; text-align: center; }
    .chat-msg .text  { color: #ccc; }

    #chat-input-row {
      display: flex;
      border-top: 1px solid #111;
    }

    #chat-input {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.45rem, 3vw, 0.55rem);
      padding: 0.7rem 0.7rem;
      background: #000;
      border: none;
      color: #fff;
      letter-spacing: 0.03em;
      outline: none;
      min-width: 0;
      -webkit-appearance: none;
    }

    #chat-input::placeholder { color: #2a2a2a; }

    #chat-send {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.42rem, 2.8vw, 0.52rem);
      padding: 0.7rem 0.9rem;
      background: #000;
      border: none;
      border-left: 1px solid #111;
      color: #0ff;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      flex-shrink: 0;
    }

    #chat-send:active { background: #0ff; color: #000; }

    /* ── CONTROLS ── */
    #controls {
      margin-top: 0.7rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    button.action {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.3rem, 2.5vw, 0.42rem);
      padding: 0.6rem 1rem;
      background: #000;
      border: 2px solid #444;
      color: #ff0;
      cursor: pointer;
      letter-spacing: 0.05em;
      border-radius: 6px;
      
      touch-action: manipulation;
      flex: 1;
      min-width: 100px;
    }

    button.action:active { background: #ff0; color: #000; text-shadow: none; }
    button.action.red { border-color: #cc0000; color: #cc0000; text-shadow: 0 0 6px #cc0000; }
    button.action.red:active { background: #cc0000; color: #fff; text-shadow: none; }

    a.back {
      margin-top: 0.8rem;
      font-size: clamp(0.28rem, 2vw, 0.35rem);
      color: #444;
      text-decoration: none;
      letter-spacing: 0.05em;
      padding: 0.5rem;
    }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 100;
      flex-direction: column;
      gap: 1.5rem;
      padding: 1.5rem;
      touch-action: manipulation;
    }

    #win-overlay.show { display: flex; }

    .win-banner {
      font-size: clamp(0.8rem, 6vw, 1.4rem);
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.5;
      animation: popIn 0.35s cubic-bezier(0.22,0.61,0.36,1);
    }

    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .win-sub {
      font-size: clamp(0.3rem, 2.5vw, 0.4rem);
      color: #aaa;
      letter-spacing: 0.12em;
      text-align: center;
      animation: blink 1s step-end infinite;
    }

    .win-play-again {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.35rem, 3vw, 0.5rem);
      padding: 0.8rem 1.5rem;
      background: #000;
      border: 2px solid #444;
      color: #ff0;
      cursor: pointer;
      border-radius: 6px;
      
      touch-action: manipulation;
    }

    .win-play-again:active { background: #ff0; color: #000; text-shadow: none; }
  </style>
</head>
<body>

  <h1>CONNECT 4</h1>
  <div class="subtitle">— 2 PLAYER —</div>

  <!-- LOBBY -->
  <div class="screen active" id="screen-lobby">
    <div class="lobby-box">
      <h2>▶ CREATE GAME</h2>
      <button class="big-btn" id="createBtn">+ CREATE ROOM</button>
    </div>
    <div class="lobby-box">
      <h2>▶ JOIN GAME</h2>
      <input class="code-input" id="joinCodeInput" maxlength="4" placeholder="CODE"
             inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <button class="big-btn cyan" id="joinBtn">→ JOIN ROOM</button>
      <div class="error-text" id="joinError"></div>
    </div>
    <a href="index.html" class="back">← back to site</a>
  </div>

  <!-- NAME -->
  <div class="screen" id="screen-name">
    <div class="lobby-box">
      <h2>▶ YOUR NAME</h2>
      <input class="name-input" id="nameInput" maxlength="12" placeholder="ENTER NAME"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="big-btn" id="nameConfirmBtn">→ LET'S PLAY</button>
    </div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="screen-waiting">
    <div class="lobby-box" style="text-align:center">
      <h2>▶ ROOM CODE</h2>
      <div class="room-code-display" id="displayCode"></div>
      <div style="font-size:clamp(0.28rem,2.2vw,0.38rem);color:#aaa;letter-spacing:0.08em;margin-bottom:0.5rem">Share this code with your opponent</div>
      <div style="font-size:clamp(0.28rem,2.2vw,0.38rem);color:#0ff;letter-spacing:0.08em">Waiting<span class="waiting-dots"></span></div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label p1-color" id="p1name-display">RED</span>
        <span class="score-num p1-color" id="score1">00</span>
      </div>
      <span class="vs-label">VS</span>
      <div class="score-item">
        <span class="score-label p2-color" id="p2name-display">GREEN</span>
        <span class="score-num p2-color" id="score2">00</span>
      </div>
    </div>

    <div class="your-role" id="yourRole"></div>
    <div id="status"></div>

    <div id="board-area">
      <div id="col-arrows"></div>
      <div id="board-wrap"><div id="board"></div></div>
    </div>

    <div id="chat-wrap">
      <div id="chat-header">LIVE CHAT</div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" maxlength="80" placeholder="say something..."
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="chat-send">SEND</button>
      </div>
    </div>

    <div id="controls">
      <button class="action red" id="quitBtn">✕ QUIT</button>
    </div>
  </div>

  <!-- WIN OVERLAY -->
  <div id="win-overlay">
    <div class="win-banner" id="win-banner"></div>
    <button class="win-play-again" id="playAgainBtn">↺ PLAY AGAIN</button>
    <div class="win-sub">OR TAP ANYWHERE</div>
  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, onDisconnect, push, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCAxHEyWGucBDW2ZKu3dMTMlTAlXQb5fp8",
      authDomain: "connect1234-7cbf1.firebaseapp.com",
      databaseURL: "https://connect1234-7cbf1-default-rtdb.firebaseio.com",
      projectId: "connect1234-7cbf1",
      storageBucket: "connect1234-7cbf1.firebasestorage.app",
      messagingSenderId: "465032944161",
      appId: "1:465032944161:web:2b363fb86cb7a0f3602160"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const ROWS = 6, COLS = 7;
    const COLORS = ['#cc0000','#00cc44'];
    const SHADOW  = ['rgba(200,0,0,0.9)','rgba(0,200,60,0.9)'];
    const DEFAULT_NAMES = ['Red Player','Green Player'];

    let roomCode, myRole, myName, gameListener, chatListener;
    let knownMsgKeys = new Set();

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function pad(n) { return n < 10 ? '0'+n : ''+n; }

    function genCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    }

    function dot(p) {
      return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[p]};margin-right:6px;vertical-align:middle;box-shadow:0 0 6px ${SHADOW[p]}"></span>`;
    }

    function setStatus(cls, html) {
      const el = document.getElementById('status');
      el.className = cls;
      el.innerHTML = html;
    }

    // ── LOBBY ──
    document.getElementById('createBtn').addEventListener('click', async () => {
      roomCode = genCode();
      myRole   = 1;
      await set(ref(db, `rooms/${roomCode}`), {
        state: 'waiting',
        p1name: '', p2name: '',
        board: Array(ROWS*COLS).fill(0),
        currentPlayer: 1,
        winCells: [], winner: null,
        scores: [0,0],
        p1connected: true, p2connected: false
      });
      onDisconnect(ref(db, `rooms/${roomCode}/p1connected`)).set(false);
      document.getElementById('displayCode').textContent = roomCode;
      show('screen-name');
    });

    document.getElementById('joinBtn').addEventListener('click', async () => {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      document.getElementById('joinError').textContent = '';
      if (code.length !== 4) { document.getElementById('joinError').textContent = 'Enter a 4-letter code!'; return; }
      const snap = await get(ref(db, `rooms/${code}`));
      if (!snap.exists()) { document.getElementById('joinError').textContent = 'Room not found!'; return; }
      const d = snap.val();
      if (d.state !== 'waiting' && !d.p2name) { document.getElementById('joinError').textContent = 'Game already started!'; return; }
      roomCode = code;
      myRole   = 2;
      await update(ref(db, `rooms/${roomCode}`), { p2connected: true });
      onDisconnect(ref(db, `rooms/${roomCode}/p2connected`)).set(false);
      if (d.p2name) document.getElementById('nameInput').value = d.p2name;
      show('screen-name');
    });

    // ── NAME ──
    document.getElementById('nameConfirmBtn').addEventListener('click', async () => {
      const raw = document.getElementById('nameInput').value.trim();
      myName = raw || DEFAULT_NAMES[myRole-1];
      const field = myRole === 1 ? 'p1name' : 'p2name';
      await update(ref(db, `rooms/${roomCode}`), { [field]: myName });

      if (myRole === 1) {
        show('screen-waiting');
        listenForStart();
      } else {
        const snap = await get(ref(db, `rooms/${roomCode}`));
        const d = snap.val();
        if (d.state === 'playing' || d.state === 'done') {
          startGame();
        } else {
          await update(ref(db, `rooms/${roomCode}`), { state: 'playing' });
          startGame();
        }
      }
    });

    function listenForStart() {
      const r = ref(db, `rooms/${roomCode}/state`);
      const unsub = onValue(r, snap => {
        if (snap.val() === 'playing' || snap.val() === 'done') {
          unsub();
          startGame();
        }
      });
    }

    // ── GAME ──
    function startGame() {
      show('screen-game');
      document.getElementById('yourRole').innerHTML =
        dot(myRole-1) + `You are ${myRole===1
          ? '<span style="color:#cc0000">RED</span>'
          : '<span style="color:#00cc44">GREEN</span>'}`;
      listenForGameState();
      listenForChat();
    }

    function listenForGameState() {
      if (gameListener) gameListener();
      gameListener = onValue(ref(db, `rooms/${roomCode}`), snap => {
        if (!snap.exists()) { setStatus('disconnected','⚠ ROOM CLOSED'); return; }
        const d = snap.val();

        document.getElementById('p1name-display').textContent = (d.p1name||'RED').toUpperCase().slice(0,8);
        document.getElementById('p2name-display').textContent = (d.p2name||'GREEN').toUpperCase().slice(0,8);
        document.getElementById('score1').textContent = pad((d.scores||[0,0])[0]);
        document.getElementById('score2').textContent = pad((d.scores||[0,0])[1]);

        const opponentConnected = myRole===1 ? d.p2connected : d.p1connected;
        const board2d = [];
        for (let r=0;r<ROWS;r++) board2d.push((d.board||[]).slice(r*COLS,r*COLS+COLS));
        const winSet = new Set((d.winCells||[]).map(i => Math.floor(i/COLS)+','+(i%COLS)));
        const lastCol = (d.lastCol !== undefined && d.lastCol !== null) ? d.lastCol : -1;
        renderBoard(board2d, winSet, d.currentPlayer, d.state, lastCol);

        if (d.state === 'done') {
          if (d.winner === 0) {
            setStatus('draw',"IT'S A DRAW!");
          } else {
            const wName = d.winner===1 ? (d.p1name||'Red Player') : (d.p2name||'Green Player');
            setStatus('winner', dot(d.winner-1)+wName.toUpperCase()+' WINS!');
            showWinOverlay(wName, d.winner);
          }
        } else if (opponentConnected === false) {
          setStatus('disconnected','⚠ OPPONENT DISCONNECTED — WAITING…');
        } else {
          const tName = d.currentPlayer===1 ? (d.p1name||'Red Player') : (d.p2name||'Green Player');
          setStatus(d.currentPlayer===1?'p1-turn':'p2-turn',
            dot(d.currentPlayer-1)+tName.toUpperCase()+"'S TURN");
        }
      });
    }

    function renderBoard(board, winSet, currentPlayer, state, lastCol) {
      const boardEl  = document.getElementById('board');
      const arrowsEl = document.getElementById('col-arrows');
      boardEl.innerHTML  = '';
      arrowsEl.innerHTML = '';
      const myTurn = currentPlayer===myRole && state==='playing';
      const lastPlayer = lastCol >= 0 ? (currentPlayer === 1 ? 2 : 1) : -1;
      const lastColor  = lastPlayer >= 1 ? COLORS[lastPlayer-1] : null;

      for (let c=0;c<COLS;c++) {
        const btn = document.createElement('button');
        btn.className = 'col-btn';
        btn.textContent = '▼';
        if (c === lastCol && lastColor) {
          btn.style.opacity = '1';
          btn.style.color = lastColor;
          btn.style.textShadow = `0 0 8px ${lastColor}`;
        } else {
          btn.style.opacity = myTurn ? '0.5' : '0.15';
          btn.style.color = '#0ff';
          btn.style.textShadow = '';
        }
        btn.disabled = !myTurn;
        btn.addEventListener('click', () => myTurn && dropPiece(c, board));
        arrowsEl.appendChild(btn);
      }

      for (let r=0;r<ROWS;r++) {
        for (let c=0;c<COLS;c++) {
          const cell  = document.createElement('div');
          const v     = board[r][c];
          const isWin = winSet.has(r+','+c);
          cell.className = 'cell'+(v===1?' p1':v===2?' p2':'')+(isWin?' win-cell':'');
          if (myTurn && v===0) {
            cell.addEventListener('click', () => dropPiece(c, board));
          }
          if (isWin) {
            const boom = document.createElement('div');
            boom.className = 'boom';
            boom.textContent = '💥';
            boom.style.animationDelay = `-${((r*7+c)*137)%600}ms`;
            cell.appendChild(boom);
          }
          boardEl.appendChild(cell);
        }
      }
    }

    async function dropPiece(col, board) {
      const snap = await get(ref(db, `rooms/${roomCode}`));
      if (!snap.exists()) return;
      const d = snap.val();
      if (d.currentPlayer!==myRole || d.state!=='playing') return;

      let row = -1;
      for (let r=ROWS-1;r>=0;r--) { if (board[r][col]===0) { row=r; break; } }
      if (row===-1) return;

      const newBoard = [...d.board];
      newBoard[row*COLS+col] = myRole;

      const winning = checkWin(newBoard, row, col, myRole);
      if (winning) {
        const newScores = [...(d.scores||[0,0])];
        newScores[myRole-1]++;
        await update(ref(db, `rooms/${roomCode}`), {
          board: newBoard, currentPlayer: myRole===1?2:1,
          state: 'done', winner: myRole, winCells: winning, scores: newScores, lastCol: col
        });
        return;
      }

      const isDraw = newBoard.slice(0,COLS).every(v=>v!==0);
      if (isDraw) {
        await update(ref(db, `rooms/${roomCode}`), { board: newBoard, state:'done', winner:0, winCells:[], lastCol: col });
        return;
      }

      await update(ref(db, `rooms/${roomCode}`), { board: newBoard, currentPlayer: myRole===1?2:1, lastCol: col });
    }

    function checkWin(board, row, col, player) {
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (const [dr,dc] of dirs) {
        let cells = [row*COLS+col];
        for (let d=1;d<4;d++) {
          const r=row+dr*d,c=col+dc*d;
          if (r<0||r>=ROWS||c<0||c>=COLS||board[r*COLS+c]!==player) break;
          cells.push(r*COLS+c);
        }
        for (let d=1;d<4;d++) {
          const r=row-dr*d,c=col-dc*d;
          if (r<0||r>=ROWS||c<0||c>=COLS||board[r*COLS+c]!==player) break;
          cells.push(r*COLS+c);
        }
        if (cells.length>=4) return cells;
      }
      return null;
    }

    function showWinOverlay(name, winner) {
      const color = COLORS[winner-1];
      const bnr = document.getElementById('win-banner');
      bnr.style.color = color;
      bnr.style.textShadow = `0 0 20px ${color}, 4px 4px 0 rgba(0,0,0,0.6)`;
      bnr.textContent = name.toUpperCase()+' WINS!';
      document.getElementById('win-overlay').classList.add('show');
    }

    async function playAgain() {
      document.getElementById('win-overlay').classList.remove('show');
      await update(ref(db, `rooms/${roomCode}`), {
        board: Array(ROWS*COLS).fill(0),
        currentPlayer: 1, state:'playing',
        winner: null, winCells: [], lastCol: null
      });
    }

    document.getElementById('win-overlay').addEventListener('click', playAgain);
    document.getElementById('playAgainBtn').addEventListener('click', e => { e.stopPropagation(); playAgain(); });

    document.getElementById('quitBtn').addEventListener('click', () => {
      if (gameListener) gameListener();
      if (chatListener) chatListener();
      location.reload();
    });

    // ── CHAT ──
    function listenForChat() {
      if (chatListener) chatListener();
      chatListener = onValue(ref(db, `rooms/${roomCode}/chat`), snap => {
        if (!snap.exists()) return;
        const msgs = snap.val();
        const container = document.getElementById('chat-messages');
        Object.entries(msgs).forEach(([key, msg]) => {
          if (knownMsgKeys.has(key)) return;
          knownMsgKeys.add(key);
          const el = document.createElement('div');
          if (msg.system) {
            el.className = 'chat-msg system';
            el.textContent = msg.text;
          } else {
            const isMine = msg.role===myRole;
            el.className = 'chat-msg '+(isMine?'mine':'theirs');
            el.innerHTML = `<span class="sender">${msg.name}:</span><span class="text"> ${escapeHtml(msg.text)}</span>`;
          }
          container.appendChild(el);
          container.scrollTop = container.scrollHeight;
        });
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function sendChat(text) {
      if (!text.trim() || !roomCode) return;
      await push(ref(db, `rooms/${roomCode}/chat`), {
        role: myRole, name: myName, text: text.trim(), ts: serverTimestamp()
      });
    }

    document.getElementById('chat-send').addEventListener('click', () => {
      const inp = document.getElementById('chat-input');
      sendChat(inp.value);
      inp.value = '';
      inp.focus();
    });

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key==='Enter') { sendChat(e.target.value); e.target.value=''; }
    });
  </script>
</body>
</html>
