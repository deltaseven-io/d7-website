<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1290px;
        height: 2796px;
        background: #000;
        overflow: hidden;
        position: relative;
      }

      /* Stars */
      .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
      }

      /* Main layout */
      .top-section {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 10;
      }

      .app-icon {
        width: 180px;
        height: 180px;
        border-radius: 40px;
        box-shadow:
          0 0 60px rgba(0, 0, 255, 0.5),
          0 0 120px rgba(0, 0, 255, 0.2);
      }

      .title {
        font-family: "Press Start 2P", monospace;
        font-size: 72px;
        color: #fff;
        text-align: center;
        line-height: 1.3;
        text-shadow:
          0 0 30px rgba(0, 0, 255, 0.8),
          0 0 60px rgba(0, 0, 255, 0.4);
        letter-spacing: 4px;
      }

      .subtitle {
        font-family: "Share Tech Mono", monospace;
        font-size: 32px;
        color: #555;
        text-align: center;
        letter-spacing: 2px;
        line-height: 1.6;
      }

      /* Screenshots section */
      .screens-section {
        position: absolute;
        top: 860px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 40px;
        z-index: 10;
        padding: 0 60px;
      }

      .screen-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .screen-wrap img {
        border-radius: 32px;
        box-shadow:
          0 20px 80px rgba(0, 0, 0, 0.8),
          0 0 30px rgba(0, 0, 255, 0.15);
        border: 2px solid #111;
      }

      .screen-label {
        font-family: "Press Start 2P", monospace;
        font-size: 16px;
        color: #333;
        text-align: center;
        letter-spacing: 1px;
        line-height: 1.6;
      }

      /* Feature pills */
      .features {
        position: absolute;
        bottom: 180px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 40px;
        z-index: 10;
        flex-wrap: wrap;
        padding: 0 80px;
      }

      .pill {
        font-family: "Press Start 2P", monospace;
        font-size: 18px;
        color: #00ff00;
        border: 2px solid #00ff00;
        border-radius: 100px;
        padding: 16px 32px;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
      }

      /* Bottom tagline */
      .tagline {
        position: absolute;
        bottom: 80px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Press Start 2P", monospace;
        font-size: 22px;
        color: #ff0;
        letter-spacing: 3px;
        text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        z-index: 10;
      }

      /* Green bar at top like in-game */
      .level-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 8px;
        background: #00ff00;
        box-shadow: 0 0 20px #00ff00;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div class="level-bar"></div>

    <!-- Stars -->
    <script>
      // Generate stars immediately
      const starData = [];
      for (let i = 0; i < 200; i++) {
        starData.push({
          x: Math.random() * 1290,
          y: Math.random() * 2796,
          size: Math.random() * 3 + 0.5,
          opacity: Math.random() * 0.7 + 0.1,
        });
      }
      document.write(
        starData
          .map(
            (s) =>
              `<div class="star" style="left:${s.x}px;top:${s.y}px;width:${s.size}px;height:${s.size}px;opacity:${s.opacity}"></div>`,
          )
          .join(""),
      );
    </script>

    <!-- Top section: icon + title -->
    <div class="top-section">
      <img src="icon.png" class="app-icon" alt="Factor Blaster" />
      <div class="title">FACTOR<br />BLASTER</div>
      <div class="subtitle">
        Build confidence in EZ Mode.<br />
        Master Challenge Mode.<br />
        Save the galaxy.
      </div>
    </div>

    <!-- Screenshots -->
    <div class="screens-section">
      <div class="screen-wrap">
        <img src="ss4.png" width="340" alt="EZ Mode" />
        <div class="screen-label">EZ MODE<br />MULTIPLE CHOICE</div>
      </div>
      <div class="screen-wrap">
        <img src="ss5.png" width="340" alt="Challenge Mode" />
        <div class="screen-label">CHALLENGE MODE<br />SPIN THE DRUMS</div>
      </div>
      <div class="screen-wrap">
        <img src="ss7.png" width="340" alt="Victory" />
        <div class="screen-label">SAVE THE<br />GALAXY</div>
      </div>
    </div>

    <!-- Feature pills -->
    <div class="features">
      <div class="pill">6 LEVELS</div>
      <div class="pill">GCF</div>
      <div class="pill">TRINOMIALS</div>
      <div class="pill">DIFF OF SQUARES</div>
      <div class="pill">NO ADS</div>
    </div>

    <!-- Tagline -->
    <div class="tagline">THE BEST WAY TO PRACTICE FACTORING</div>
  </body>
</html>
